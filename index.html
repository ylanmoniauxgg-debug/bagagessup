<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suppléments Bagages</title>
<style>
body { font-family: Arial; text-align: center; }
.container { margin-top: 50px; }
select, button, input { margin: 10px; padding: 10px; }
#popup {
  display:none;
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%, -50%);
  background:white;
  padding:20px;
  border:2px solid black;
}
.overlay {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="container">
  <h2>Suppléments Bagages</h2>

  <select id="nombre">
    <option value="1">1 bagage</option>
    <option value="2">2 bagages</option>
    <option value="3">3 bagages</option>
    <option value="4">4 bagages</option>
    <option value="5">5 bagages</option>
    <option value="6">6 bagages</option>
  </select>

  <select id="type">
    <option>Bagage cabine</option>
    <option>Valise -15kg</option>
    <option>Valise +15kg</option>
  </select>

  <p id="prix">Total : 14€</p>

  <button onclick="payer()">Payer</button>
</div>

<div class="overlay" id="overlay"></div>

<div id="popup">
  <h3>Paiement 100% Sécur +</h3>
  <input placeholder="Numéro de carte"><br>
  <input placeholder="Date"><br>
  <input placeholder="CVC"><br><br>
  <button onclick="valider()">Valider</button>
</div>

<script>
const prixElement = document.getElementById("prix");

document.getElementById("nombre").addEventListener("change", updatePrix);

function updatePrix() {
  let nb = document.getElementById("nombre").value;
  prixElement.innerText = "Total : " + (nb * 14) + "€";
}

function payer() {
  document.getElementById("popup").style.display = "block";
  document.getElementById("overlay").style.display = "block";
}

function valider() {
  document.getElementById("popup").style.display = "none";
  document.getElementById("overlay").style.display = "none";
  alert("Paiement Validé");
}
</script>

</body>
</html>
